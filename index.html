<style id="coordit-styles">
/* Coordit — Premium Vintage Wardrobe */
:root {
  /* Brand palette */
  --obsidian: #1C1B1A;
  --obsidian-soft: #2D2A27;
  --camel: #B08A5B;
  --camel-deep: #8F6F45;
  --camel-soft: #D4B896;
  --ivory: #F5F0E6;
  --ivory-warm: #EFE8D8;
  --linen: #E8DFC9;
  --linen-deep: #DDD0B3;
  --slate: #5A6B7E;
  --slate-deep: #3F4E5E;
  --slate-soft: #8A9AAC;
  --walnut: #4A3826;
  --walnut-light: #6B523A;

  /* Semantic */
  --bg: var(--ivory);
  --bg-raised: #FBF7EE;
  --text: var(--obsidian);
  --text-muted: #6B6357;
  --text-dim: #9A9287;
  --line: rgba(28, 27, 26, 0.08);
  --line-strong: rgba(28, 27, 26, 0.16);

  /* Semantic for fit analysis */
  --fit-tight: #A8423A;
  --fit-perfect: #5B7355;
  --fit-loose: #7A6FA0;

  --radius-sm: 4px;
  --radius: 8px;
  --radius-lg: 16px;
  --radius-xl: 24px;
}

html, body {
  margin: 0;
  padding: 0;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body, 'Inter', system-ui, sans-serif);
  font-feature-settings: 'ss01', 'cv11';
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

* { box-sizing: border-box; }

.serif { font-family: var(--font-display, 'Cormorant Garamond', 'Playfair Display', serif); }
.sans  { font-family: var(--font-body, 'Inter', system-ui, sans-serif); }
.mono  { font-family: 'JetBrains Mono', ui-monospace, monospace; }
.korean-serif { font-family: var(--font-korean-display, 'Noto Serif KR', serif); }
.korean-sans { font-family: var(--font-korean, 'Pretendard', 'Noto Sans KR', sans-serif); }

/* Typographic utilities */
.eyebrow {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text-muted);
}

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 14px 28px;
  border-radius: var(--radius);
  border: 1px solid transparent;
  font-family: var(--font-korean, 'Pretendard', sans-serif);
  font-size: 14px;
  font-weight: 500;
  letter-spacing: 0.02em;
  cursor: pointer;
  transition: all 0.2s ease;
  white-space: nowrap;
}
.btn-primary {
  background: var(--obsidian);
  color: var(--ivory);
}
.btn-primary:hover { background: var(--walnut); }
.btn-secondary {
  background: transparent;
  color: var(--obsidian);
  border-color: var(--line-strong);
}
.btn-secondary:hover { background: rgba(28,27,26,0.04); }
.btn-camel {
  background: var(--camel);
  color: var(--ivory);
}
.btn-camel:hover { background: var(--camel-deep); }

/* Cards */
.card {
  background: var(--bg-raised);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
}

/* Placeholder (no real imagery) */
.ph {
  background:
    repeating-linear-gradient(135deg, rgba(74,56,38,0.06) 0 1px, transparent 1px 8px),
    var(--linen);
  color: var(--walnut);
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 12px;
}
.ph-dark {
  background:
    repeating-linear-gradient(135deg, rgba(245,240,230,0.06) 0 1px, transparent 1px 8px),
    var(--obsidian-soft);
  color: var(--linen);
}

/* Scroll */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius: 4px; }

<script type="text/babel" data-name="api">
// ── API Layer ──
const BASE = 'http://localhost:3000';

window.Auth = {
  getToken: () => { try { return localStorage.getItem('coordit_token'); } catch { return null; } },
  setToken: (t) => { try { localStorage.setItem('coordit_token', t); } catch {} },
  getUser:  () => { try { return JSON.parse(localStorage.getItem('coordit_user') || 'null'); } catch { return null; } },
  setUser:  (u) => { try { localStorage.setItem('coordit_user', JSON.stringify(u)); } catch {} },
  logout:   () => { try { localStorage.removeItem('coordit_token'); localStorage.removeItem('coordit_user'); } catch {} },
};

async function apiFetch(path, opts = {}) {
  const token = window.Auth.getToken();
  const headers = { 'Content-Type': 'application/json', ...(opts.headers || {}) };
  if (token) headers['Authorization'] = `Bearer ${token}`;
  const res = await fetch(`${BASE}${path}`, { ...opts, headers });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
  return data;
}

window.API = {
  // Auth
  register: (body) => apiFetch('/api/auth/register', { method: 'POST', body: JSON.stringify(body) }),
  login:    (body) => apiFetch('/api/auth/login',    { method: 'POST', body: JSON.stringify(body) }),

  // Measurements
  getMeasurements: ()   => apiFetch('/api/measurements'),
  saveMeasurements:(m)  => apiFetch('/api/measurements', { method: 'PUT', body: JSON.stringify(m) }),

  // Closet
  getCloset:   (q = {}) => apiFetch('/api/closet?' + new URLSearchParams(q)),
  getItem:     (id)     => apiFetch(`/api/closet/${id}`),
  addItem:     (body)   => apiFetch('/api/closet', { method: 'POST', body: JSON.stringify(body) }),
  updateItem:  (id, b)  => apiFetch(`/api/closet/${id}`, { method: 'PUT', body: JSON.stringify(b) }),
  deleteItem:  (id)     => apiFetch(`/api/closet/${id}`, { method: 'DELETE' }),
  wearItem:    (id)     => apiFetch(`/api/closet/${id}/wear`, { method: 'POST' }),

  // Fit Analysis
  getFitAnalysis: (itemId) => apiFetch(`/api/fit-analysis${itemId ? '?item_id=' + itemId : ''}`),

  // Styling
  generateStyling: (body) => apiFetch('/api/styling/generate', { method: 'POST', body: JSON.stringify(body) }),
  getSavedLooks:   ()     => apiFetch('/api/styling/saved'),
  saveLook:        (id)   => apiFetch(`/api/styling/${id}/save`, { method: 'POST' }),

  // Stats
  getStats: () => apiFetch('/api/stats'),
};

// ── Toast notifications ──
window.Toast = {
  show(msg, type = 'info') {
    const el = document.createElement('div');
    const colors = { info: '#1C1B1A', error: '#A8423A', success: '#5B7355' };
    el.style.cssText = `position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
      background:${colors[type]};color:#F5F0E6;padding:12px 24px;border-radius:4px;z-index:99999;
      font-family:Pretendard,sans-serif;font-size:14px;transition:transform 0.3s ease;
      box-shadow:0 8px 24px rgba(0,0,0,0.3);white-space:nowrap;`;
    el.textContent = msg;
    document.body.appendChild(el);
    requestAnimationFrame(() => { el.style.transform = 'translateX(-50%) translateY(0)'; });
    setTimeout(() => {
      el.style.transform = 'translateX(-50%) translateY(80px)';
      setTimeout(() => el.remove(), 350);
    }, 3000);
  }
};
</script>

<script type="text/babel" data-name="shell">
// Coordit — Shared components and design system
// Export to window for cross-file access

const { useState, useEffect, useRef, useMemo } = React;

// ═══════════════════════════════════════════════════
// Logo / wordmark
// ═══════════════════════════════════════════════════
function Logo({ size = 24, color, brand = "Coordit" }) {
  return (
    <div style={{
      display: 'flex', alignItems: 'baseline', gap: 2,
      fontFamily: "var(--font-display, 'Cormorant Garamond', serif)",
      fontSize: size, fontWeight: 500,
      letterSpacing: '-0.02em',
      color: color || 'var(--obsidian)',
    }}>
      <span style={{ fontStyle: 'italic', fontWeight: 600 }}>C</span>
      <span>oordit</span>
      <span style={{
        width: 5, height: 5, borderRadius: '50%',
        background: 'var(--camel)', marginLeft: 2,
        alignSelf: 'center', transform: 'translateY(-1px)',
      }} />
    </div>
  );
}

// ═══════════════════════════════════════════════════
// TopBar (nav)
// ═══════════════════════════════════════════════════
function TopBar({ active, onNav, brand, user, onLogout }) {
  const [showUserMenu, setShowUserMenu] = React.useState(false);
  const items = [
    { id: 'closet', label: 'Closet', ko: '옷장' },
    { id: 'styling', label: 'Styling', ko: '스타일링' },
    { id: 'fit', label: 'Fit Lab', ko: '핏 분석' },
    { id: 'atelier', label: 'Atelier', ko: '아뜰리에' },
  ];
  return (
    <header style={{
      position: 'sticky', top: 0, zIndex: 50,
      background: 'rgba(245,240,230,0.85)',
      backdropFilter: 'blur(20px)',
      borderBottom: '1px solid var(--line)',
      padding: '18px 48px',
      display: 'flex', alignItems: 'center', gap: 40,
    }}>
      <div onClick={() => onNav('landing')} style={{ cursor: 'pointer' }}>
        <Logo size={22} brand={brand} />
      </div>
      <nav style={{ display: 'flex', gap: 32, marginLeft: 24 }}>
        {items.map(it => (
          <button
            key={it.id}
            onClick={() => onNav(it.id)}
            style={{
              background: 'transparent', border: 'none', cursor: 'pointer',
              padding: '6px 2px',
              fontFamily: "var(--font-korean, 'Pretendard', sans-serif)",
              fontSize: 13, letterSpacing: '0.02em',
              color: active === it.id ? 'var(--obsidian)' : 'var(--text-muted)',
              borderBottom: active === it.id ? '1px solid var(--camel)' : '1px solid transparent',
              transition: 'all 0.2s',
            }}
          >
            <span style={{ fontFamily: "var(--font-display, serif)", fontStyle: 'italic', fontWeight: 500, marginRight: 6 }}>
              {it.label}
            </span>
            <span style={{ fontSize: 11, opacity: 0.7 }}>{it.ko}</span>
          </button>
        ))}
      </nav>
      <div style={{ marginLeft: 'auto', display: 'flex', gap: 16, alignItems: 'center' }}>
        <div style={{
          padding: '8px 14px',
          border: '1px solid var(--line-strong)',
          borderRadius: 20,
          fontSize: 11, color: 'var(--text-muted)',
          fontFamily: 'JetBrains Mono, monospace',
          letterSpacing: '0.1em',
          display: 'flex', gap: 8, alignItems: 'center',
        }}>
          <span style={{ width: 6, height: 6, borderRadius: '50%', background: 'var(--fit-perfect)' }} />
          AI ACTIVE
        </div>
        <div style={{
          width: 32, height: 32, borderRadius: '50%',
          background: 'var(--walnut)', color: 'var(--ivory)',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          fontSize: 12, fontWeight: 600,
          fontFamily: 'var(--font-display, serif)', fontStyle: 'italic',
        }}>
          {user ? (user.name || user.email || '인').charAt(0).toUpperCase() : '인'}
        </div>
        {user && (
          <div style={{ position: 'relative' }}>
            <button onClick={() => setShowUserMenu(v => !v)} style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: 11, fontFamily: 'JetBrains Mono, monospace', color: 'var(--text-muted)', letterSpacing: '0.08em' }}>
              {user.name || user.email.split('@')[0]} ▾
            </button>
            {showUserMenu && (
              <div style={{ position: 'absolute', top: '100%', right: 0, marginTop: 8, background: 'var(--bg-raised)', border: '1px solid var(--line)', borderRadius: 4, padding: 8, minWidth: 160, boxShadow: '0 8px 24px rgba(0,0,0,0.1)', zIndex: 100 }}>
                <button onClick={() => { onNav('onboarding'); setShowUserMenu(false); }} style={{ display: 'block', width: '100%', textAlign: 'left', padding: '8px 12px', background: 'none', border: 'none', fontSize: 13, cursor: 'pointer', color: 'var(--obsidian)', fontFamily: "var(--font-korean, sans-serif)" }}>
                  체형 설정
                </button>
                <button onClick={() => { if (onLogout) onLogout(); setShowUserMenu(false); }} style={{ display: 'block', width: '100%', textAlign: 'left', padding: '8px 12px', background: 'none', border: 'none', fontSize: 13, cursor: 'pointer', color: 'var(--fit-tight)', fontFamily: "var(--font-korean, sans-serif)" }}>
                  로그아웃
                </button>
              </div>
            )}
          </div>
        )}
        {!user && (
          <button onClick={() => onNav('__auth')} style={{ padding: '8px 16px', background: 'var(--obsidian)', color: 'var(--ivory)', border: 'none', borderRadius: 4, fontSize: 12, cursor: 'pointer', fontFamily: "var(--font-korean, sans-serif)" }}>
            로그인
          </button>
        )}
      </div>
    </header>
  );
}

// ═══════════════════════════════════════════════════
// Footer
// ═══════════════════════════════════════════════════
function Footer({ brand }) {
  return (
    <footer style={{
      padding: '48px 48px 32px',
      borderTop: '1px solid var(--line)',
      background: 'var(--bg-raised)',
      display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start',
      gap: 32, marginTop: 64,
    }}>
      <div>
        <Logo size={20} brand={brand} />
        <div style={{ fontSize: 11, color: 'var(--text-dim)', marginTop: 8, fontFamily: 'JetBrains Mono, monospace', letterSpacing: '0.1em' }}>
          THE CURATED WARDROBE · EST. 2026
        </div>
      </div>
      <div style={{ display: 'flex', gap: 32, fontSize: 12, color: 'var(--text-muted)' }}>
        <a style={linkStyle}>이용약관</a>
        <a style={linkStyle}>개인정보 처리방침</a>
        <a style={linkStyle}>지속가능성 리포트</a>
        <a style={linkStyle}>Fit Guide</a>
        <a style={linkStyle}>고객지원</a>
      </div>
    </footer>
  );
}
const linkStyle = { color: 'inherit', textDecoration: 'none', cursor: 'pointer' };

// ═══════════════════════════════════════════════════
// Chip / Tag
// ═══════════════════════════════════════════════════
function Chip({ children, active, onClick, variant = 'default' }) {
  const bg = variant === 'dark'
    ? (active ? 'var(--obsidian)' : 'transparent')
    : (active ? 'var(--obsidian)' : 'transparent');
  const color = active ? 'var(--ivory)' : 'var(--obsidian)';
  return (
    <button onClick={onClick} style={{
      padding: '8px 18px',
      borderRadius: 999,
      border: active ? '1px solid var(--obsidian)' : '1px solid var(--line-strong)',
      background: bg, color,
      fontSize: 12, letterSpacing: '0.02em',
      fontFamily: "var(--font-korean, 'Pretendard', sans-serif)",
      cursor: 'pointer',
      transition: 'all 0.2s',
    }}>{children}</button>
  );
}

// ═══════════════════════════════════════════════════
// Stat number (editorial display)
// ═══════════════════════════════════════════════════
function Stat({ value, label, unit, trend }) {
  return (
    <div>
      <div style={{ fontFamily: 'var(--font-display, serif)', fontSize: 40, fontWeight: 500, letterSpacing: '-0.02em', color: 'var(--obsidian)', lineHeight: 1 }}>
        {value}{unit && <span style={{ fontSize: 16, color: 'var(--text-muted)', marginLeft: 4 }}>{unit}</span>}
      </div>
      <div style={{ fontSize: 11, color: 'var(--text-muted)', marginTop: 8, letterSpacing: '0.1em', textTransform: 'uppercase', fontFamily: 'JetBrains Mono, monospace' }}>
        {label}

<script type="text/babel" data-name="auth">
// Coordit — Auth screens (Login / Register)

function AuthScreen({ onAuth }) {
  const [mode, setMode] = React.useState('login');
  const [form, setForm] = React.useState({ email: '', password: '', name: '' });
  const [loading, setLoading] = React.useState(false);
  const [error, setError] = React.useState('');

  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

  const submit = async () => {
    if (!form.email || !form.password) { setError('이메일과 비밀번호를 입력해주세요.'); return; }
    setLoading(true); setError('');
    try {
      const res = mode === 'login'
        ? await window.API.login({ email: form.email, password: form.password })
        : await window.API.register({ email: form.email, password: form.password, name: form.name });
      window.Auth.setToken(res.token);
      window.Auth.setUser(res.user);
      onAuth(res.user);
    } catch (e) {
      setError(e.message);
    } finally {
      setLoading(false);
    }
  };

  const inp = (k, placeholder, type = 'text') => (
    <input
      type={type} placeholder={placeholder} value={form[k]}
      onChange={e => set(k, e.target.value)}
      onKeyDown={e => e.key === 'Enter' && submit()}
      style={{
        width: '100%', padding: '14px 16px',
        border: '1px solid var(--line-strong)', borderRadius: 4,
        background: 'transparent', outline: 'none',
        fontSize: 14, fontFamily: "var(--font-korean, 'Pretendard', sans-serif)",

    <main style={{
      minHeight: '100vh', background: 'var(--bg)',
      display: 'flex', alignItems: 'center', justifyContent: 'center',

    }}>
      <div style={{ width: '100%', maxWidth: 440 }}>
        {/* Logo */}
        <div style={{ textAlign: 'center', marginBottom: 48 }}>
          <div style={{
            fontFamily: "var(--font-display, 'Cormorant Garamond', serif)",
            fontSize: 38, fontWeight: 500, letterSpacing: '-0.02em',
            color: 'var(--obsidian)',
          }}>
            <span style={{ fontStyle: 'italic', fontWeight: 600 }}>C</span>oordit
            <span style={{
              display: 'inline-block', width: 7, height: 7, borderRadius: '50%',
              background: 'var(--camel)', marginLeft: 3, verticalAlign: 'middle',
              transform: 'translateY(-3px)',
            }}/>
          </div>
          <div style={{ fontSize: 10, fontFamily: 'JetBrains Mono, monospace', letterSpacing: '0.2em', color: 'var(--text-muted)', marginTop: 4 }}>
            THE CURATED WARDROBE
          </div>
        </div>

        <div style={{ background: 'var(--bg-raised)', border: '1px solid var(--line)', borderRadius: 4, padding: 40 }}>

            <h2 className="korean-serif" style={{
              margin: 0, fontSize: 28, fontWeight: 500,
              fontFamily: "var(--font-korean-display, serif)",
              letterSpacing: '-0.02em',
            }}>
              {mode === 'login' ? '다시 만나요' : '큐레이션을 시작합니다'}
            </h2>
            <p style={{ margin: '8px 0 0', fontSize: 13, color: 'var(--text-muted)', fontFamily: "var(--font-korean, sans-serif)" }}>
              {mode === 'login' ? '옷장과 스타일 분석이 기다리고 있습니다.' : '당신의 옷장을 AI가 큐레이션합니다.'}
            </p>
          </div>

          <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
            {mode === 'register' && inp('name', '이름 (선택)')}
            {inp('email', '이메일', 'email')}
            {inp('password', '비밀번호', 'password')}
          </div>

          {error && (
            <div style={{ marginTop: 12, padding: '10px 14px', background: 'rgba(168,66,58,0.08)', border: '1px solid rgba(168,66,58,0.2)', borderRadius: 4, fontSize: 13, color: 'var(--fit-tight)', fontFamily: "var(--font-korean, sans-serif)" }}>
              {error}
            </div>
          )}

          <button className="btn btn-primary" onClick={submit} disabled={loading}
            style={{ width: '100%', marginTop: 20, opacity: loading ? 0.7 : 1 }}>
            {loading ? '처리중...' : mode === 'login' ? '로그인' : '계정 만들기'}
          </button>

          <div style={{ textAlign: 'center', marginTop: 20, fontSize: 13, color: 'var(--text-muted)', fontFamily: "var(--font-korean, sans-serif)" }}>
            {mode === 'login' ? '계정이 없으신가요?' : '이미 계정이 있으신가요?'}
            {' '}
            <button onClick={() => { setMode(mode === 'login' ? 'register' : 'login'); setError(''); }}
              style={{ background: 'none', border: 'none', color: 'var(--walnut)', cursor: 'pointer', fontSize: 13, fontFamily: "var(--font-korean, sans-serif)", textDecoration: 'underline', padding: 0 }}>

        {/* Quick demo login */}

          <button onClick={async () => {
            setForm({ email: 'demo@coordit.com', password: 'demo1234', name: '' });

              // Try login first, register if not exists

          </button>
        </div>
      </div>
    </main>
  );
}

window.AuthScreen = AuthScreen;
</script>

  const [form, setForm] = useState({ name: '', name_ko: '', category: '상의', color: '#8F6F45', fabric: '', size: 'M', brand: '', garment_shoulder: '', garment_chest: '', garment_waist: '', garment_length: '' });
  const [loading, setLoading] = useState(false);

  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

  const save = async () => {
    if (!form.name_ko && !form.name) { window.Toast.show('이름을 입력해주세요.', 'error'); return; }
    setLoading(true);
    try {
      const body = { ...form };
      ['garment_shoulder','garment_chest','garment_waist','garment_length'].forEach(k => { if (body[k]) body[k] = parseFloat(body[k]); else delete body[k]; });
      if (!body.name) body.name = body.name_ko;
      await window.API.addItem(body);
      window.Toast.show('아이템이 추가되었습니다!', 'success');
      onSaved();
    } catch (e) { window.Toast.show(e.message, 'error'); } finally { setLoading(false); }
  };

  const inp = (k, label, type='text', placeholder='') => (
    <div key={k}>
      <div style={{ fontSize: 11, color: 'var(--text-muted)', marginBottom: 4, fontFamily: 'JetBrains Mono, monospace', letterSpacing: '0.08em' }}>{label}</div>
      <input type={type} value={form[k]} onChange={e => set(k, e.target.value)} placeholder={placeholder}
        style={{ width: '100%', padding: '10px 12px', border: '1px solid var(--line-strong)', borderRadius: 4, background: 'transparent', outline: 'none', fontSize: 14, fontFamily: "var(--font-korean, sans-serif)", color: 'var(--obsidian)' }} />
    </div>
  );

  return (
    <div style={{ position: 'fixed', inset: 0, background: 'rgba(28,27,26,0.7)', zIndex: 10000, display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 24 }} onClick={onClose}>

        </div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
          {inp('name_ko', '의류명 (한국어)', 'text', '예: 헤리티지 카멜 코트')}
          {inp('name', '의류명 (English)', 'text', 'e.g. Heritage Camel Coat')}

            <div style={{ fontSize: 11, color: 'var(--text-muted)', marginBottom: 4, fontFamily: 'JetBrains Mono, monospace', letterSpacing: '0.08em' }}>카테고리</div>
            <select value={form.category} onChange={e => set('category', e.target.value)} style={{ width: '100%', padding: '10px 12px', border: '1px solid var(--line-strong)', borderRadius: 4, background: 'var(--bg)', fontSize: 14 }}>

            </select>
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
            {inp('fabric', '소재', 'text', 'Wool, Cotton, Cashmere...')}
            {inp('size', '사이즈', 'text', 'XS / S / M / L / XL')}

          <div>
            <div style={{ fontSize: 11, color: 'var(--text-muted)', marginBottom: 4, fontFamily: 'JetBrains Mono, monospace', letterSpacing: '0.08em' }}>대표 색상</div>

              <input type="color" value={form.color} onChange={e => set('color', e.target.value)} style={{ width: 44, height: 44, border: '1px solid var(--line-strong)', borderRadius: 4, cursor: 'pointer', padding: 2 }} />

          <div style={{ borderTop: '1px solid var(--line)', paddingTop: 16 }}>

            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
              {inp('garment_shoulder', '어깨 (cm)', 'number', '43.0')}
              {inp('garment_chest', '가슴 둘레 (cm)', 'number', '102')}

function ClosetCard({ item, onFit, onFavorite, onDelete }) {
  const [hover, setHover] = useState(false);
  const title = item.name_ko || item.name;
  const sub = `${item.category}${item.fabric ? ' · ' + item.fabric : ''}`;
  const c = item.color || '#8F6F45';

  return (
    <div style={{ background: 'var(--bg-raised)', border: item.is_favorite ? '1px solid var(--camel)' : '1px solid var(--line)', borderRadius: 4, overflow: 'hidden', transition: 'all 0.25s', transform: hover ? 'translateY(-2px)' : 'none', boxShadow: hover ? '0 12px 28px rgba(74,56,38,0.10)' : 'none' }}

      <div style={{ aspectRatio: '4/5', background: c, position: 'relative', overflow: 'hidden' }}>
        {item.image_url && <img src={item.image_url} alt="" style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', objectFit: 'cover', filter: 'grayscale(0.1) contrast(1.02)' }}/>}
        {!item.image_url && (
          <div style={{ position: 'absolute', inset: 0, backgroundImage: 'repeating-linear-gradient(135deg, rgba(255,255,255,0.04) 0 1px, transparent 1px 10px)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <span style={{ fontSize: 9, fontFamily: 'JetBrains Mono, monospace', letterSpacing: '0.15em', color: 'rgba(255,255,255,0.4)' }}>{item.category.toUpperCase()}</span>
          </div>
        )}
        {item.fabric && (
          <div style={{ position: 'absolute', top: 14, left: 14, padding: '4px 10px', background: 'rgba(245,240,230,0.92)', color: 'var(--walnut)', fontSize: 9, fontFamily: 'JetBrains Mono, monospace', letterSpacing: '0.12em', borderRadius: 2 }}>
            {item.fabric.toUpperCase()}
          </div>
        )}
        <div style={{ position: 'absolute', top: 14, right: 14, display: 'flex', gap: 6 }}>
          <button onClick={(e) => { e.stopPropagation(); onFavorite(); }} style={{ width: 28, height: 28, borderRadius: '50%', background: 'rgba(13,12,11,0.55)', border: 'none', cursor: 'pointer', color: item.is_favorite ? '#D4B896' : 'rgba(245,240,230,0.6)', fontSize: 12 }}>
            {item.is_favorite ? '♥' : '♡'}
          </button>
          <button onClick={(e) => { e.stopPropagation(); onDelete(); }} style={{ width: 28, height: 28, borderRadius: '50%', background: 'rgba(13,12,11,0.55)', border: 'none', cursor: 'pointer', color: 'rgba(245,240,230,0.6)', fontSize: 10 }}>
            ✕
          </button>
        </div>
        <div style={{ position: 'absolute', bottom: 12, left: 14, padding: '4px 8px', background: 'rgba(13,12,11,0.55)', backdropFilter: 'blur(8px)', color: 'var(--ivory)', fontSize: 10, fontFamily: 'JetBrains Mono, monospace', letterSpacing: '0.15em', borderRadius: 2 }}>
          {item.size || 'M'} · #{String(item.id).padStart(3, '0')}
        </div>
      </div>
      <div style={{ padding: '14px 16px' }}>
        <div className="korean-sans" style={{ fontSize: 14, fontWeight: 500 }}>{title}</div>
        <div className="korean-sans" style={{ fontSize: 11, color: 'var(--text-muted)', marginTop: 2 }}>{sub}</div>
        <div style={{ marginTop: 10, display: 'flex', gap: 6 }}>
          <button onClick={onFit} style={{ flex: 1, padding: '7px 0', background: 'var(--linen)', border: 'none', borderRadius: 2, fontSize: 10, fontFamily: 'JetBrains Mono, monospace', letterSpacing: '0.08em', color: 'var(--walnut)', cursor: 'pointer' }}>
            핏 분석
          </button>
          {item.worn_count > 0 && (
            <div style={{ padding: '7px 10px', background: 'var(--line)', borderRadius: 2, fontSize: 10, fontFamily: 'JetBrains Mono, monospace', color: 'var(--text-muted)' }}>
              {item.worn_count}회
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function MiniStat({ label, value, unit, accent }) {
  return (
    <div>
      <div style={{ fontFamily: 'var(--font-display, serif)', fontSize: 24, fontWeight: 500, letterSpacing: '-0.02em', color: accent || 'var(--obsidian)', lineHeight: 1 }}>
        {value}{unit && <span style={{ fontSize: 12, color: 'var(--text-muted)', marginLeft: 2 }}>{unit}</span>}
      </div>
      <div style={{ fontSize: 10, color: 'var(--text-muted)', marginTop: 6, fontFamily: 'JetBrains Mono, monospace', letterSpacing: '0.1em', textTransform: 'uppercase' }}>
        {label}
      </div>

  );
}

window.Closet = Closet;

<script type="text/babel" data-name="body3d">
// Coordit Fit Lab — Three.js 3D mannequin component
// Matte atelier torso, drag-to-rotate, with fit-state measurement rings + HTML overlay labels.

const Body3DComponent = (() => {
  // fitData: { shoulder:{state,delta}, chest:{state,delta}, waist:{state,delta}, hip:{state,delta} }
  // measurements: { shoulder, chest, waist, hip, height } — used to scale figure
  function Body3D({ width = 500, height = 720, fitData = null, measurements = null }) {
    const mountRef = React.useRef(null);
    const rafRef = React.useRef(null);
    const stateRef = React.useRef({ rotY: 0.35, targetY: 0.35, dragging: false, lastX: 0 });
    const ringsRef = React.useRef({});
    const [labels, setLabels] = React.useState({});

    React.useEffect(() => {
      const mount = mountRef.current;
      if (!mount || !window.THREE) return;

      const THREE = window.THREE;
      const scene = new THREE.Scene();
      scene.background = null;

      // Wider FOV + framed to see head to toe
      const camera = new THREE.PerspectiveCamera(30, width / height, 0.1, 100);
      camera.position.set(0, 0, 9);
      camera.lookAt(0, 0, 0);

      const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, preserveDrawingBuffer: true });
      renderer.setPixelRatio(Math.min(2, window.devicePixelRatio || 1));
      renderer.setSize(width, height);
      renderer.outputColorSpace = THREE.SRGBColorSpace || THREE.sRGBEncoding;
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.1;
      mount.appendChild(renderer.domElement);

      // ── LIGHTS ── editorial studio lighting
      const key = new THREE.DirectionalLight(0xf5e9cf, 1.5);
      key.position.set(-3, 4, 4);
      scene.add(key);

      const rim = new THREE.DirectionalLight(0xb08a5b, 1.0);
      rim.position.set(4, 2, -3);
      scene.add(rim);

      const fill = new THREE.DirectionalLight(0x8a7a6a, 0.4);
      fill.position.set(0, -2, 4);
      scene.add(fill);

      const ambient = new THREE.AmbientLight(0x2a2420, 0.4);
      scene.add(ambient);

      // ── MANNEQUIN MATERIAL ── matte porcelain/plaster
      const skinMat = new THREE.MeshStandardMaterial({
        color: 0xd4b896,
        roughness: 0.85,
        metalness: 0.05,
      });

      // ── MANNEQUIN ── group holding all body parts
      const figure = new THREE.Group();

      // Head (oval)
      const head = new THREE.Mesh(
        new THREE.SphereGeometry(0.22, 32, 24),
        skinMat
      );
      head.scale.set(0.85, 1.05, 0.9);
      head.position.y = 3.05;
      figure.add(head);

      // Neck
      const neck = new THREE.Mesh(
        new THREE.CylinderGeometry(0.09, 0.11, 0.22, 24),
        skinMat
      );
      neck.position.y = 2.75;
      figure.add(neck);

      // Torso — more human proportions via curved LatheGeometry
      const torsoProfile = [
        new THREE.Vector2(0.32, 0.0),
        new THREE.Vector2(0.30, 0.15),
        new THREE.Vector2(0.27, 0.35),
        new THREE.Vector2(0.28, 0.55),
        new THREE.Vector2(0.34, 0.85),
        new THREE.Vector2(0.36, 1.00),
        new THREE.Vector2(0.40, 1.15),
        new THREE.Vector2(0.38, 1.25),
        new THREE.Vector2(0.22, 1.35),
        new THREE.Vector2(0.14, 1.40),
      ];
      const torsoGeom = new THREE.LatheGeometry(torsoProfile, 48);
      torsoGeom.scale(1.08, 1.0, 0.72);
      const torso = new THREE.Mesh(torsoGeom, skinMat);
      torso.position.y = 1.25;
      figure.add(torso);

      // Hips
      const hipProfile = [
        new THREE.Vector2(0.32, 0.0),
        new THREE.Vector2(0.36, 0.10),
        new THREE.Vector2(0.38, 0.22),
        new THREE.Vector2(0.36, 0.35),
        new THREE.Vector2(0.30, 0.45),
      ];
      const hipGeom = new THREE.LatheGeometry(hipProfile, 48);
      hipGeom.scale(1.1, 1.0, 0.78);
      const hips = new THREE.Mesh(hipGeom, skinMat);
      hips.position.y = 0.85;
      figure.add(hips);

      // Arms
      function makeArm(sideX) {
        const arm = new THREE.Group();
        const upper = new THREE.Mesh(new THREE.CylinderGeometry(0.09, 0.075, 0.72, 20), skinMat);
        upper.position.set(0, -0.36, 0);
        arm.add(upper);
        const fore = new THREE.Mesh(new THREE.CylinderGeometry(0.075, 0.06, 0.6, 20), skinMat);
        fore.position.set(0, -1.02, 0);
        arm.add(fore);
        const elbow = new THREE.Mesh(new THREE.SphereGeometry(0.08, 20, 16), skinMat);
        elbow.position.set(0, -0.72, 0);
        arm.add(elbow);
        const shoulder = new THREE.Mesh(new THREE.SphereGeometry(0.12, 20, 16), skinMat);
        arm.add(shoulder);
        const hand = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.22, 0.08), skinMat);
        hand.position.set(0, -1.42, 0);
        arm.add(hand);
        arm.position.set(sideX * 0.44, 2.5, 0);
        arm.rotation.z = sideX * 0.08;
        return arm;
      }
      figure.add(makeArm(-1), makeArm(1));

      // Legs
      function makeLeg(sideX) {
        const leg = new THREE.Group();
        const thigh = new THREE.Mesh(new THREE.CylinderGeometry(0.14, 0.11, 0.88, 20), skinMat);
        thigh.position.set(0, -0.44, 0);
        leg.add(thigh);
        const knee = new THREE.Mesh(new THREE.SphereGeometry(0.12, 20, 16), skinMat);
        knee.position.set(0, -0.88, 0);
        leg.add(knee);
        const calf = new THREE.Mesh(new THREE.CylinderGeometry(0.11, 0.08, 0.82, 20), skinMat);
        calf.position.set(0, -1.32, 0);
        leg.add(calf);
        const foot = new THREE.Mesh(new THREE.BoxGeometry(0.14, 0.1, 0.32), skinMat);
        foot.position.set(0, -1.78, 0.06);
        leg.add(foot);
        leg.position.set(sideX * 0.16, 0.85, 0);
        return leg;
      }
      figure.add(makeLeg(-1), makeLeg(1));

      // Scale figure based on user measurements for personalised body shape
      const mH = measurements && measurements.height ? measurements.height / 172 : 1;
      const mW = measurements && measurements.chest ? Math.sqrt(measurements.chest / 98) : 1;
      figure.position.y = -1.4 * mH;
      figure.scale.set(0.72 * mW, 0.72 * mH, 0.72 * mW);
      scene.add(figure);

      // ── FIT-STATE MEASUREMENT RINGS ──
      const FIT_COLORS = {
        tight:   { ring: 0xc85a4e, glow: 0xff7a68, css: '#D66A5D' },
        perfect: { ring: 0x6b8a60, glow: 0x9acc80, css: '#7FA870' },
        loose:   { ring: 0x8d7fb5, glow: 0xb5a8e0, css: '#9D90C7' },
      };

      function makeFitRing(fitKey, radius, yOffset, squeezeZ = 0.72) {
        const col = FIT_COLORS[fitKey] || FIT_COLORS.perfect;
        const group = new THREE.Group();

        const innerGeom = new THREE.TorusGeometry(radius, 0.028, 14, 120);
        const inner = new THREE.Mesh(innerGeom, new THREE.MeshBasicMaterial({
          color: col.ring, transparent: true, opacity: 1.0, side: THREE.DoubleSide,
        }));
        inner.rotation.x = Math.PI / 2;
        group.add(inner);

        const outerGeom = new THREE.TorusGeometry(radius, 0.055, 14, 120);
        const outer = new THREE.Mesh(outerGeom, new THREE.MeshBasicMaterial({
          color: col.glow, transparent: true, opacity: 0.28, side: THREE.DoubleSide, blending: THREE.AdditiveBlending, depthWrite: false,
        }));
        outer.rotation.x = Math.PI / 2;
        group.add(outer);

        const markerGeom = new THREE.TorusGeometry(radius, 0.006, 8, 120);
        const marker = new THREE.Mesh(markerGeom, new THREE.MeshBasicMaterial({
          color: 0x1a1612, transparent: true, opacity: 0.6,
        }));
        marker.rotation.x = Math.PI / 2;
        group.add(marker);

        group.scale.set(1.08, squeezeZ, 1.0);
        group.position.y = yOffset;
        group.userData = { ...group.userData, radius, fitKey };
        return group;
      }

      // Use fitData from API if available, otherwise use defaults
      const fd = fitData || {};
      const shoulderState = fd.shoulder ? fd.shoulder.state : 'tight';
      const chestState    = fd.chest    ? fd.chest.state    : 'perfect';
      const waistState    = fd.waist    ? fd.waist.state    : 'loose';
      const hipState      = fd.hip      ? fd.hip.state      : 'perfect';

      const shoulderRing = makeFitRing(shoulderState, 0.44, 2.40);
      figure.add(shoulderRing);

      const chestRing = makeFitRing(chestState, 0.38, 2.10);
      figure.add(chestRing);

      const waistRing = makeFitRing(waistState, 0.31, 1.60);
      figure.add(waistRing);

      const hipRing = makeFitRing(hipState, 0.38, 0.95);
      hipRing.children[0].material.opacity = 0.55;
      hipRing.children[1].material.opacity = 0.14;
      figure.add(hipRing);

      // Store refs for dynamic updates
      ringsRef.current = { shoulderRing, chestRing, waistRing, hipRing };

      // ── CALIPER BRACKETS ── white/camel L-brackets on each side of fit rings (cheat: small arcs outside figure)
      function makeCaliper(fitKey, radius, yOffset, squeezeZ = 0.72) {
        const col = FIT_COLORS[fitKey];
        const group = new THREE.Group();
        const calR = radius * 1.15; // slightly larger than ring
        // Short arcs on left and right side (±20 degrees around ±X axis)
        for (const sign of [-1, 1]) {
          const arcGeom = new THREE.TorusGeometry(calR, 0.008, 8, 32, Math.PI / 7);
          const arc = new THREE.Mesh(arcGeom, new THREE.MeshBasicMaterial({
            color: 0xf5e9cf, transparent: true, opacity: 0.85,
          }));
          arc.rotation.x = Math.PI / 2;
          arc.rotation.y = sign > 0 ? -Math.PI / 14 : Math.PI - Math.PI / 14;
          group.add(arc);
        }
        group.scale.set(1.08, squeezeZ, 1.0);
        group.position.y = yOffset;
        return group;
      }
      figure.add(makeCaliper('tight', 0.44, 2.40));
      figure.add(makeCaliper('perfect', 0.38, 2.10));
      figure.add(makeCaliper('loose', 0.31, 1.60));
      figure.add(makeCaliper('perfect', 0.38, 0.95));

      // ── FLOOR — circular platform ──
      const platform = new THREE.Mesh(
        new THREE.CircleGeometry(1.6, 64),
        new THREE.MeshStandardMaterial({ color: 0x1a1612, roughness: 0.95, metalness: 0 })
      );
      platform.rotation.x = -Math.PI / 2;
      platform.position.y = -1.62;
      scene.add(platform);

      // Platform rim glow
      const rimRing = new THREE.Mesh(
        new THREE.TorusGeometry(1.6, 0.008, 8, 128),
        new THREE.MeshBasicMaterial({ color: 0xd4b896, transparent: true, opacity: 0.4 })
      );
      rimRing.rotation.x = Math.PI / 2;
      rimRing.position.y = -1.615;
      scene.add(rimRing);

      // ── LABEL ANCHORS ── dynamic from fitData or defaults
      const makeDelta = (d) => d ? `${parseFloat(d) > 0 ? '+' : ''}${d}cm` : '—';
      const anchors = [
        { id: 'shoulder', part: '어깨', en: 'SHOULDER',
          state: (fd.shoulder ? fd.shoulder.label : 'Tight').toUpperCase(),
          fit: shoulderState,
          delta: fd.shoulder ? makeDelta(fd.shoulder.delta) : '-1.5cm',
          y: 2.40, r: 0.44 },
        { id: 'chest', part: '가슴', en: 'CHEST',
          state: (fd.chest ? fd.chest.label : 'Perfect').toUpperCase(),
          fit: chestState,
          delta: fd.chest ? makeDelta(fd.chest.delta) : '+4.0cm',
          y: 2.10, r: 0.38 },
        { id: 'waist', part: '허리', en: 'WAIST',
          state: (fd.waist ? fd.waist.label : 'Loose').toUpperCase(),
          fit: waistState,
          delta: fd.waist ? makeDelta(fd.waist.delta) : '+6.0cm',
          y: 1.60, r: 0.31 },
        { id: 'hip', part: '힙', en: 'HIP',
          state: (fd.hip ? fd.hip.label : 'Perfect').toUpperCase(),
          fit: hipState,
          delta: fd.hip ? makeDelta(fd.hip.delta) : '+1.5cm',
          y: 0.95, r: 0.38 },
      ];
      const anchorVec = new THREE.Vector3();

      function projectAnchors() {
        const next = {};
        for (const a of anchors) {
          // local point at +x edge of the ring in figure coords (ring squeezeX = 1.08)
          anchorVec.set(a.r * 1.08, a.y, 0);
          // apply figure's transform (position + scale + rotation)
          const v = anchorVec.clone();
          figure.localToWorld(v);
          v.project(camera);
          // convert NDC to pixels
          const x = (v.x * 0.5 + 0.5) * width;
          const y = (-v.y * 0.5 + 0.5) * height;
          // if behind camera or off-screen laterally, hide label
          const visible = v.z < 1 && x > 0 && x < width;
          next[a.id] = { ...a, x, y, visible, css: FIT_COLORS[a.fit].css };
        }
        setLabels(next);
      }

      // ── DRAG ROTATION ──
      const canvas = renderer.domElement;
      canvas.style.cursor = 'grab';
      canvas.style.display = 'block';
      canvas.style.width = width + 'px';
      canvas.style.height = height + 'px';

      const onDown = (e) => {
        stateRef.current.dragging = true;
        stateRef.current.lastX = e.clientX ?? (e.touches && e.touches[0].clientX);
        canvas.style.cursor = 'grabbing';
      };
      const onUp = () => {
        stateRef.current.dragging = false;
        canvas.style.cursor = 'grab';
      };
      const onMove = (e) => {
        if (!stateRef.current.dragging) return;
        const x = e.clientX ?? (e.touches && e.touches[0].clientX);
        const dx = x - stateRef.current.lastX;
        stateRef.current.lastX = x;
        stateRef.current.targetY += dx * 0.008;
      };

      canvas.addEventListener('mousedown', onDown);
      window.addEventListener('mouseup', onUp);
      window.addEventListener('mousemove', onMove);
      canvas.addEventListener('touchstart', onDown, { passive: true });
      window.addEventListener('touchend', onUp);
      window.addEventListener('touchmove', onMove, { passive: true });

      // ── ANIMATION LOOP ──
      let frameCount = 0;
      const tick = () => {
        stateRef.current.rotY += (stateRef.current.targetY - stateRef.current.rotY) * 0.08;
        if (!stateRef.current.dragging) {
          stateRef.current.targetY += 0.0015;
        }
        figure.rotation.y = stateRef.current.rotY;
        renderer.render(scene, camera);
        // Project labels every 2 frames (~30Hz enough)
        if (frameCount++ % 2 === 0) projectAnchors();
        rafRef.current = requestAnimationFrame(tick);
      };
      tick();

      return () => {
        cancelAnimationFrame(rafRef.current);
        canvas.removeEventListener('mousedown', onDown);
        window.removeEventListener('mouseup', onUp);
        window.removeEventListener('mousemove', onMove);
        canvas.removeEventListener('touchstart', onDown);
        window.removeEventListener('touchend', onUp);
        window.removeEventListener('touchmove', onMove);
        renderer.dispose();
        if (mount.contains(renderer.domElement)) {
          mount.removeChild(renderer.domElement);
        }
      };
    }, [width, height]);

    // HTML overlay labels positioned via projected anchor coords
    return (
      <div style={{
        position: 'absolute', inset: 0,
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        pointerEvents: 'none',
      }}>
        <div ref={mountRef} style={{
          position: 'relative', width, height,
          pointerEvents: 'auto',
        }}>
          {/* HTML overlay labels */}
          <div style={{ position: 'absolute', inset: 0, pointerEvents: 'none' }}>
            {Object.values(labels).map((L) => (
              <div key={L.id} style={{
                position: 'absolute',
                left: L.x, top: L.y,
                transform: 'translate(8px, -50%)',
                opacity: L.visible ? 1 : 0.2,
                transition: 'opacity 0.3s',
                fontFamily: "'JetBrains Mono', monospace",
                fontSize: 10,
                letterSpacing: '0.08em',
                color: '#F5F0E6',
                whiteSpace: 'nowrap',
              }}>
                {/* Leader dot + line */}
                <div style={{
                  display: 'inline-flex', alignItems: 'center', gap: 6,
                  background: 'rgba(10, 9, 8, 0.88)',
                  border: `1px solid ${L.css}`,
                  borderLeft: `3px solid ${L.css}`,
                  padding: '6px 10px',
                  backdropFilter: 'blur(6px)',
                }}>
                  <div>
                    <div style={{ display: 'flex', alignItems: 'baseline', gap: 6 }}>
                      <span style={{ color: '#F5F0E6', fontWeight: 500 }}>{L.en}</span>
                      <span style={{ color: 'rgba(245,240,230,0.5)', fontSize: 9 }}>{L.part}</span>
                    </div>
                    <div style={{ display: 'flex', alignItems: 'baseline', gap: 8, marginTop: 3 }}>
                      <span style={{ color: L.css, fontWeight: 600, fontSize: 11 }}>{L.state}</span>
                      <span style={{ color: 'rgba(245,240,230,0.7)', fontFamily: "'Cormorant Garamond', serif", fontSize: 13, fontStyle: 'italic' }}>{L.delta}</span>
                    </div>
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>
    );
  }

  return Body3D;
})();

window.Body3D = Body3DComponent;

</script>

<script type="text/babel" data-name="fit-lab">
// Coordit — Fit Lab (핏 분석) — redesigned hero + editorial layout

function FitLab({ onNav, brand, user, onLogout }) {
  const [selectedItemId, setSelectedItemId] = useState(null);
  const [closetItems, setClosetItems] = useState([]);
  const [fitData, setFitData] = useState(null);
  const [measurements, setMeasurements] = useState(null);
  const [loading, setLoading] = useState(true);
  const [analyzing, setAnalyzing] = useState(false);

  useEffect(() => {
    Promise.all([
      window.API.getCloset(),
      window.API.getMeasurements(),
    ]).then(([items, m]) => {
      setClosetItems(items);
      setMeasurements(m);
      if (items.length > 0) setSelectedItemId(items[0].id);
    }).catch(e => window.Toast.show(e.message, 'error'))
    .finally(() => setLoading(false));
  }, []);

  useEffect(() => {
    if (!selectedItemId) return;
    setAnalyzing(true);
    window.API.getFitAnalysis(selectedItemId)
      .then(data => setFitData(data))
      .catch(e => window.Toast.show(e.message, 'error'))
      .finally(() => setAnalyzing(false));
  }, [selectedItemId]);

  const sizes = ['XS', 'S', 'M', 'L', 'XL'];
  const [selectedSize, setSelectedSize] = useState('M');
  const FIT_COLOR_MAP = { tight: 'var(--fit-tight)', perfect: 'var(--fit-perfect)', loose: 'var(--fit-loose)' };
  const selectedItem = closetItems.find(i => i.id === selectedItemId);
  const analysis = fitData && fitData.analysis;

  const regions = analysis ? [
    analysis.shoulder && { part: '어깨', en: 'SHOULDER', state: analysis.shoulder.label, color: FIT_COLOR_MAP[analysis.shoulder.state], v: analysis.shoulder.delta, pct: analysis.shoulder.state === 'perfect' ? 65 : analysis.shoulder.state === 'tight' ? 85 : 40, top: '14%' },

function Onboarding({ onNav, brand, user, onLogout }) {

  ];
  const occasions = ['출근', '데이트', '여행', '운동', '파티', '일상'];
  const [selected, setSelected] = React.useState([]);
  const [selOccasion, setSelOccasion] = React.useState([]);
  const toggle = (arr, setArr, v) => setArr(arr.includes(v) ? arr.filter(x => x !== v) : [...arr, v]);

  return (
    <div style={{ background: 'var(--bg-raised)', border: '1px solid var(--line)', borderRadius: 4, padding: 48 }}>

}

function OnboardingFirstItem({ onFinish, onPrev }) {
  const cats = ['상의', '하의', '아우터', '원피스', '신발', '액세서리'];
  const [form, setForm] = React.useState({ name: '', category: '상의', color: '#B08A5B', size: 'M', fabric: '', garment_shoulder: '', garment_chest: '', garment_waist: '', garment_length: '' });

  const handleSave = async () => {
    if (!form.name.trim()) { window.Toast.show('아이템 이름을 입력해주세요', 'error'); return; }
    setSaving(true);
    try {
      await window.API.addItem({
        ...form,
        garment_shoulder: form.garment_shoulder ? +form.garment_shoulder : null,
        garment_chest:    form.garment_chest    ? +form.garment_chest    : null,
        garment_waist:    form.garment_waist    ? +form.garment_waist    : null,
        garment_length:   form.garment_length   ? +form.garment_length   : null,
      });
      window.Toast.show('첫 아이템이 등록되었습니다!', 'success');
      onFinish();

      setSaving(false);

            <select value={form.category} onChange={e => setForm({ ...form, category: e.target.value })}

              <select value={form.size} onChange={e => setForm({ ...form, size: e.target.value })}

            </div>

          </div>
          <div style={{ borderTop: '1px solid var(--line)', paddingTop: 16 }}>
            <div className="korean-sans" style={{ fontSize: 11, opacity: 0.6, marginBottom: 12 }}>의류 치수 (핏 분석용, 선택)</div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
              {[['garment_shoulder','어깨'],['garment_chest','가슴'],['garment_waist','허리'],['garment_length','총장']].map(([k,l]) => (
                <div key={k}>

              ))}

          </div>

        <div style={{ display: 'flex', gap: 10, marginTop: 32 }}>

          <button className="btn btn-primary" style={{ flex: 1, opacity: saving ? 0.7 : 1 }} disabled={saving} onClick={handleSave}>
            {saving ? '등록 중...' : '등록하고 시작하기 →'}
          </button>
        </div>
        <button className="korean-sans" style={{ marginTop: 12, width: '100%', background: 'none', border: 'none', color: 'var(--text-muted)', fontSize: 12, cursor: 'pointer', padding: '8px 0' }}
          onClick={onFinish}>나중에 등록할게요 →</button>
      </div>

      <div style={{ background: 'var(--obsidian)', color: 'var(--ivory)', borderRadius: 4, padding: 32 }}>

        <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
          <div style={{ padding: '20px 24px', border: '1px solid var(--camel-soft)', borderRadius: 4, background: 'rgba(176,138,91,0.1)' }}>
            <div style={{ fontSize: 9, fontFamily: 'JetBrains Mono, monospace', letterSpacing: '0.1em', opacity: 0.6, marginBottom: 8 }}>NEW · {form.category.toUpperCase()}</div>
            <div className="korean-sans" style={{ fontSize: 16, fontWeight: 600 }}>{form.name || '아이템 이름'}</div>
            <div style={{ display: 'flex', gap: 8, marginTop: 12, alignItems: 'center' }}>
              <div style={{ width: 20, height: 20, borderRadius: '50%', background: form.color, border: '1px solid rgba(255,255,255,0.2)' }}/>
              <span style={{ fontSize: 11, opacity: 0.7, fontFamily: 'JetBrains Mono, monospace' }}>{form.size} · {form.fabric || '—'}</span>
            </div>
          </div>
          <div style={{ fontSize: 12, opacity: 0.5, textAlign: 'center', fontFamily: 'var(--font-display, serif)', fontStyle: 'italic', paddingTop: 8 }}>
            Your wardrobe begins here.
          </div>
        </div>
      </div>
    </div>
  );
}

function AltMethod({ icon, title, body, tag }) {

Object.assign(window, { Product, Onboarding, Atelier });

<script type="text/babel">
const { useState, useEffect } = React;

// Tweakable defaults
const TWEAKS = /*EDITMODE-BEGIN*/{
  "brandName": "DDrobe",
  "fontDisplay": "Fraunces",
  "fontKoreanDisplay": "Noto Serif KR",
  "fontBody": "Inter",
  "fontKorean": "Pretendard"
}/*EDITMODE-END*/;

function App() {
  const [user, setUser] = useState(() => window.Auth.getUser());
  const [screen, setScreen] = useState(() => {
    try { return localStorage.getItem('coordit-screen') || 'landing'; }
    catch { return 'landing'; }
  });
  const [tweaks, setTweaks] = useState(TWEAKS);
  const [tweaksOpen, setTweaksOpen] = useState(false);

  // Check if server is reachable on first load
  useEffect(() => {
    if (!window.Auth.getToken()) return;
    window.API.getStats().catch(() => {
      // Token might be invalid if server restarted — keep user in auth'd state for now
    });
  }, []);

  const handleAuth = (u) => {
    setUser(u);
    setScreen('landing');
  };

  const handleLogout = () => {
    window.Auth.logout();
    setUser(null);
    setScreen('landing');
    try { localStorage.removeItem('coordit-screen'); } catch {}
  };

  useEffect(() => {
    try { localStorage.setItem('coordit-screen', screen); } catch {}
    window.scrollTo(0, 0);
  }, [screen]);

  useEffect(() => {
    const r = document.documentElement.style;
    r.setProperty('--font-display', `'${tweaks.fontDisplay}', serif`);
    r.setProperty('--font-korean-display', `'${tweaks.fontKoreanDisplay}', serif`);
    r.setProperty('--font-body', `'${tweaks.fontBody}', system-ui, sans-serif`);
    r.setProperty('--font-korean', `'${tweaks.fontKorean}', sans-serif`);
  }, [tweaks]);

  // Edit mode / tweaks protocol
  useEffect(() => {
    const handler = (e) => {
      if (!e.data || typeof e.data !== 'object') return;
      if (e.data.type === '__activate_edit_mode') setTweaksOpen(true);
      else if (e.data.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const updateTweak = (k, v) => {
    const next = { ...tweaks, [k]: v };
    setTweaks(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*');
  };

  // Routes that require auth
  const protectedScreens = ['closet', 'fit', 'styling', 'onboarding'];

  const handleNav = (s) => {
    if (protectedScreens.includes(s) && !user) {
      // Show auth screen
      setScreen('__auth');
      return;
    }
    setScreen(s);
  };

  const screens = {
    landing: Landing,
    closet: Closet,
    fit: FitLab,
    styling: Styling,
    product: Product,
    onboarding: Onboarding,
    atelier: Atelier,
  };

  if (screen === '__auth' || (protectedScreens.includes(screen) && !user)) {
    return <AuthScreen onAuth={handleAuth} />;
  }

  const Current = screens[screen] || Landing;

  return (
    <div data-screen-label={screen}>
      <Current onNav={handleNav} brand={tweaks.brandName} user={user} onLogout={handleLogout} />
      {tweaksOpen && <TweaksPanel tweaks={tweaks} update={updateTweak} />}
    </div>
  );
}

function TweaksPanel({ tweaks, update }) {
  const displayFonts = ['Cormorant Garamond', 'EB Garamond', 'Playfair Display', 'Fraunces'];
  const koreanDisplay = ['Noto Serif KR'];
  const bodyFonts = ['Inter'];
  const koreanBody = ['Pretendard', 'Noto Sans KR'];

  return (
    <div style={{
      position: 'fixed', bottom: 24, right: 24, width: 320,
      background: 'var(--obsidian)', color: 'var(--ivory)',
      border: '1px solid var(--walnut)',
      borderRadius: 4, padding: 20, zIndex: 9999,
      fontFamily: 'Inter, sans-serif',
      boxShadow: '0 24px 60px rgba(0,0,0,0.4)',
    }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16 }}>
        <div style={{ fontFamily: 'Cormorant Garamond, serif', fontStyle: 'italic', fontSize: 22, fontWeight: 500 }}>Tweaks</div>
        <span style={{ fontSize: 9, fontFamily: 'JetBrains Mono, monospace', letterSpacing: '0.12em', color: 'var(--camel-soft)' }}>LIVE</span>
      </div>

      <TweakGroup label="BRAND">
        <div style={{ display: 'flex', gap: 4 }}>
          {['Coordit', 'DDrobe'].map(b => (
            <button key={b} onClick={() => update('brandName', b)} style={tweakBtn(tweaks.brandName === b)}>{b}</button>
          ))}
        </div>
      </TweakGroup>

      <TweakGroup label="DISPLAY (EN)">
        {displayFonts.map(f => (
          <button key={f} onClick={() => update('fontDisplay', f)} style={tweakBtn(tweaks.fontDisplay === f, true)}>
            <span style={{ fontFamily: `'${f}', serif`, fontStyle: 'italic' }}>{f}</span>
          </button>
        ))}
      </TweakGroup>

      <TweakGroup label="DISPLAY (KR)">
        {koreanDisplay.map(f => (
          <button key={f} onClick={() => update('fontKoreanDisplay', f)} style={tweakBtn(tweaks.fontKoreanDisplay === f, true)}>
            <span style={{ fontFamily: `'${f}', serif` }}>{f}</span>
          </button>
        ))}
      </TweakGroup>

      <TweakGroup label="BODY (KR)">
        {koreanBody.map(f => (
          <button key={f} onClick={() => update('fontKorean', f)} style={tweakBtn(tweaks.fontKorean === f, true)}>
            <span style={{ fontFamily: `'${f}', sans-serif` }}>{f}</span>
          </button>
        ))}
      </TweakGroup>
    </div>
  );
}

function TweakGroup({ label, children }) {
  return (
    <div style={{ marginBottom: 14 }}>
      <div style={{ fontSize: 9, fontFamily: 'JetBrains Mono, monospace', letterSpacing: '0.15em', opacity: 0.6, marginBottom: 6 }}>{label}</div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>{children}</div>
    </div>
  );
}

const tweakBtn = (active, full) => ({
  padding: '8px 12px', fontSize: 12, cursor: 'pointer',
  background: active ? 'var(--camel)' : 'transparent',
  color: active ? 'var(--obsidian)' : 'var(--ivory)',
  border: `1px solid ${active ? 'var(--camel)' : 'rgba(245,240,230,0.2)'}`,
  borderRadius: 2, textAlign: 'left', width: full ? '100%' : 'auto',
  transition: 'all 0.15s',
});

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
